<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LedgerLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas:  "#FAFAF9",
              surface: "#FFFFFF",
              line:    { DEFAULT: "#EAE8E4", strong: "#D6D3CE" },
              ink:     { DEFAULT: "#0E0E10", 2: "#57534E", 3: "#A8A29E" },
              brand: {
                50:  "#EEF2FF",
                100: "#E0E7FF",
                200: "#C7D2FE",
                400: "#818CF8",
                500: "#6366F1",
                600: "#4F46E5",
                700: "#4338CA",
                800: "#3730A3",
              },
            },
            fontFamily: {
              sans: ["Geist", "ui-sans-serif", "system-ui", "sans-serif"],
              mono: ["Geist Mono", "ui-monospace", "monospace"],
            },
            boxShadow: {
              "elev-1":    "0 1px 0 0 rgba(15,15,17,.04), 0 1px 2px 0 rgba(15,15,17,.04)",
              "elev-2":    "0 1px 0 0 rgba(15,15,17,.04), 0 6px 20px -8px rgba(15,15,17,.10)",
              "elev-brand":"0 10px 30px -10px rgba(79,70,229,.35)",
            },
            transitionTimingFunction: {
              snap: "cubic-bezier(.2,.8,.2,1)",
            },
            borderRadius: {
              "2xl": "1rem",
              "3xl": "1.25rem",
            },
          },
        },
        plugins: [],
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
